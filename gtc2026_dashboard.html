
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTC 2026 Interactive Dashboard</title>
    <style>
        :root {
            --nvidia-green: #76b900;
            --dark-bg: #0b0b0b;
            --card-bg: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --accent: #2d2d2d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #000;
            border-right: 1px solid var(--accent);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--nvidia-green);
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-item:hover {
            background: var(--glass);
            color: #fff;
        }

        .nav-item.active {
            background: var(--nvidia-green);
            color: #000;
        }

        /* Main Content */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            scroll-behavior: smooth;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            margin: 0;
        }

        .header p {
            color: var(--text-secondary);
            margin-top: 8px;
        }

        /* Slot Card */
        .slot-container {
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .time-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--nvidia-green);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .side-by-side {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--nvidia-green);
            transform: translateY(-2px);
        }

        .card.plan-a::after {
            content: 'PLAN A';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            font-weight: 800;
            background: var(--nvidia-green);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .card.plan-b::after {
            content: 'PLAN B';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            font-weight: 800;
            background: #444;
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        .card.hackathon {
            grid-column: span 2;
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            border: 1px dashed var(--nvidia-green);
        }

        .card.hackathon::after {
            content: 'SPECIAL EVENT / PLAN C';
            background: #ff3e00;
            color: #fff;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .card-meta {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 16px;
            display: flex;
            gap: 15px;
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 20px;
            flex: 1;
        }

        .btn {
            display: inline-block;
            background: var(--glass);
            color: #fff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--nvidia-green);
            color: #000;
        }

        .gift-tag {
            background: #fffde7;
            color: #795548;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .side-by-side { grid-template-columns: 1fr; }
            .sidebar { width: 60px; padding: 10px; }
            .logo, .nav-item span { display: none; }
        }
    </style>
</head>
